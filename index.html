<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetShare - WiFi QR Connect</title>
    <link rel="stylesheet" href="style.css">
    <!-- QR Code library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="viewport">
        <div class="glass-panel">
            <aside class="sidebar">
                <header>
                    <div class="logo-wrapper">
                        <div class="app-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
                        </div>
                        <h1>NetShare</h1>
                    </div>
                    <p>Instantly share your network</p>
                </header>

                <div class="input-section">
                    <div class="input-group">
                        <label for="ssid">Network SSID</label>
                        <input type="text" id="ssid" placeholder="e.g. Hyper-Link_5G" autocomplete="off">
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="••••••••" autocomplete="off">
                            <button type="button" id="togglePassword" title="Toggle visibility">
                                <svg class="eye-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="encryption">Security Protocol</label>
                        <select id="encryption">
                            <option value="WPA">WPA/WPA2/WPA3</option>
                            <option value="WEP">WEP</option>
                            <option value="nopass">None (Open)</option>
                        </select>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="hidden">
                        <label for="hidden">Hidden Network</label>
                    </div>

                    <button id="generateBtn" class="primary-button">Generate Guest Card</button>
                </div>

                <div class="footer-note">
                    Privacy Note: Generated QR codes are processed locally in your browser and never stored on remote servers.
                </div>
            </aside>

            <main class="main-content">
                <div class="glow"></div>
                
                <div class="qr-container">
                    <div id="qrcode"></div>
                    <div class="qr-placeholder" id="qrPlaceholder">
                        <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="7" y="7" width="3" height="3"></rect><rect x="14" y="7" width="3" height="3"></rect><rect x="7" y="14" width="3" height="3"></rect><path d="M14 14h3v3h-3z"></path></svg>
                        <p>QR code sync ready<br>Enter network details</p>
                    </div>

                    <div class="instruction-text" id="instructionArea" style="opacity: 0.6;">
                        Point your camera at the generated code to<br>
                        <strong>Instantly Connect</strong> without a password.
                    </div>

                    <div class="qr-actions" id="qrActions" style="display: none;">
                        <button id="downloadBtn" class="secondary-button">Save Image</button>
                        <button id="printBtn" class="secondary-button">Print Card</button>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
